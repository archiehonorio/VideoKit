services:
  - type: web
    name: vidpull
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
